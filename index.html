<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemfront - Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, rgba(10, 10, 26, 0.95), rgba(20, 20, 50, 0.8)), 
                        url('https://images.unsplash.com/photo-1518176258769-f2430c396591?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .login-container {
            backdrop-filter: blur(10px); 
            background: rgba(255, 255, 255, 0.05); 
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .login-container h2 {
            margin-top: 0;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .input-group input {
            width: 93%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #f72585; 
            box-shadow: 0 0 10px rgba(247, 37, 133, 0.5);
        }

        .login-button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(90deg, #f72585, #7209b7);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .login-button:hover {
            transform: translateY(-3px); 
            box-shadow: 0 5px 15px rgba(247, 37, 133, 0.4);
        }

        .options {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 13px;
        }

        .options a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            transition: 0.3s;
        }

        .options a:hover {
            color: #f72585;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>SISTEMFRONT</h2>
        
        <div class="input-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="nome@exemplo.com">
        </div>

        <div class="input-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="••••••••">
        </div>

        <button class="login-button" onclick="window.location.href='painel.html'">Entrar</button>

        <div class="options">
            <a href="#">Lembrar senha</a>
            <a href="#">Cadastre-se</a>
        </div>
    </div>
</body>
</html>
